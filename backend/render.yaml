# Render Blueprint: разворачивает backend как Web Service
# Использование:
#   1. https://dashboard.render.com → New + → Blueprint
#   2. Подключите GitHub-репозиторий и выберите ветку main
#   3. Render найдёт этот файл и создаст сервис автоматически
#   4. После деплоя — скопируйте URL вида https://ias-uav-tek-backend.onrender.com
#      и добавьте его в .env / GitHub Secret VITE_API_URL

services:
  - type: web
    name: ias-uav-tek-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ВАЖНО: Render по умолчанию ставит свежий Node (26+), под который better-sqlite3
      # ещё не собирается. Жёстко пиним Node 20 LTS.
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: '*'
      # ===== Email-уведомления =====
      # ЗАПОЛНИТЕ ВРУЧНУЮ в Render Dashboard → Environment.
      # Без этих переменных используется Ethereal (фейковый SMTP, превью в логах).
      # Resend: SMTP_HOST=smtp.resend.com, SMTP_PORT=465, SMTP_USER=resend, SMTP_PASS=<api_key>
      # Gmail:  SMTP_HOST=smtp.gmail.com, SMTP_PORT=465, SMTP_USER=<email>, SMTP_PASS=<app_password>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # URL фронта на GitHub Pages — нужен для ссылки в письме
      - key: FRONTEND_URL
        sync: false
